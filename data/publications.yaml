  - title: "An open-source platform for head-fixed operant and consummatory behavior"
    year: 2023
    authors: "<strong>Gordon-Fennell A.</strong>, Barbakh J.M., Utley M., Singh S., Bazzino P., Gowrishankar R., Bruchas M.R., Roitman M.F., Stuber G.D."
    journal: "eLife"
    first_author: true
    doi: "10.7554/eLife.86183"
    abstract: "We developed OHRBETS (Open-source Head-fixed Rodent Behavioral and Electrophysiology Testing System), a low-cost, open-source platform for measuring operant and consummatory behaviors in head-fixed mice. OHRBETS enables a range of behavioral paradigms — including instrumental conditioning for sucrose, brief access taste tasks, intracranial self-stimulation, and real-time place preference — while head-fixing animals for compatibility with calcium imaging, fiber photometry, and electrophysiology. Validated across multiple labs and freely available."
    pdf: ""
    figures: []

  - title: "Illuminating subcortical GABAergic and glutamatergic circuits for reward and aversion"
    year: 2021
    authors: "<strong>Gordon-Fennell A.</strong>, Stuber G.D."
    journal: "Neuropharmacology"
    first_author: true
    doi: "10.1016/j.neuropharm.2021.108725"
    abstract: "This review synthesizes the functional roles of subcortical GABA and glutamate neurons in mediating reward and aversive valence. We discuss how opposing inhibitory and excitatory subpopulations in structures including the lateral hypothalamus, ventral tegmental area, and extended amygdala shape motivated behavior, with implications for understanding the neural basis of reinforcement."
