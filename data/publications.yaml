in_revision:
  - title: "Lateral hypothalamic glutamate and GABA neurons cooperatively shape striatum-wide dopamine dynamics during consumption"
    year: 2025
    authors: "<strong>Gordon-Fennell A.</strong>, Benowitz B.M., Barbakh J.M., Montequin I., Campuzano A., Stevenson H., Hjort M.M., Critz M., Ancell E., Witten D.M., Stuber G.D."
    preprint: "https://doi.org/10.1101/2025.04.09.648052"
    abstract: "The lateral hypothalamus (LHA) is a critical hub for motivated behavior, but how GABA and glutamate subpopulations cooperatively regulate dopamine (DA) dynamics across the striatum to shape consumption remains unclear. We used multi-site fiber photometry to map DA release across anterior–posterior striatal subregions during consummatory behavior and determined the causal role of LHA GABA and glutamate neurons in shaping these dynamics."

