{{ define "main" }}
<div class="page-section">
  <div class="container">
    <h1 class="page-title">Contact</h1>

    <div class="contact-item">
      <p class="contact-label">Email</p>
      <p class="contact-value"><a href="mailto:{{ .Site.Params.email }}">{{ .Site.Params.email }}</a></p>
    </div>
    <div class="contact-item">
      <p class="contact-label">Office</p>
      <p class="contact-value">Psychology Building<br>Busch Campus<br>Rutgers University<br>Piscataway, NJ</p>
    </div>
    <div class="contact-item">
      <p class="contact-label">Google Scholar</p>
      <p class="contact-value"><a href="{{ .Site.Params.scholar }}" target="_blank" rel="noopener">View publications</a></p>
    </div>

  </div>
</div>
{{ end }}
